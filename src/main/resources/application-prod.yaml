spring:
  application:
    name: MobileAPI
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    format-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/
        - classpath:/resources/
        - classpath:/META-INF/resources/
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  graphql:
    path: /graphql
    graphiql:
      enabled: false

openapi:
  service:
    api-docs: api-service
    server: ${RENDER_EXTERNAL_URL}
    title: API Service
    version: 1.0.0

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${RENDER_EXTERNAL_URL}/api/pay/vnpay/return
  version: 2.1.0
  command: pay
  currency-code: VND
  locale: vn
  bank-code: NCB

jwt:
  issuer: ngoctaiphan
  audience: ngoctaiphan
  expiration-minutes: 30
  keys:
    private-key: classpath:keys/private_key.pem
    public-key: classpath:keys/public_key.pem 