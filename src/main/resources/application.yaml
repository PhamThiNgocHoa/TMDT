spring:
  application:
    name: MobileAPI

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tmdt}?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driverClassName: com.mysql.cj.jdbc.Driver

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    format-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/
        - classpath:/resources/
        - classpath:/META-INF/resources/
        - file:/external/path/

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  graphql:
    path: /graphql
    graphiql:
      enabled: true

openapi:
  service:
    api-docs: ${OPENAPI_DOCS:api-service}
    server: ${OPENAPI_SERVER:http://localhost:8080}
    title: ${OPENAPI_TITLE:API Service}
    version: ${OPENAPI_VERSION:1.0.0}

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: /api/pay/vnpay/return
  version: 2.1.0
  command: pay
  currency-code: VND
  locale: vn
  bank-code: NCB

jwt:
  issuer: ngoctaiphan
  audience: ngoctaiphan
  expiration-minutes: 30
  keys:
    private-key: classpath:keys/private_key.pem
    public-key: classpath:keys/public_key.pem

app:
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/redirect
